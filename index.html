<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Horsie Picker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a18">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
    <script>
        const savedTheme = localStorage.getItem('horsie_theme') || 'system';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root {
            --accent: #f44336;
            --accent-light: #FCEBEB;
            --accent-dark: #A32D2D;
            --bg: #ffffff;
            --bg2: #F7F6F3;
            --border: rgba(0,0,0,0.1);
            --border2: rgba(0,0,0,0.18);
            --text: #1a1a18;
            --text2: #5a5a54;
            --text3: #9a9990;
            --radius: 10px;
            --radius-lg: 14px;
            --gray-100: #F5F5F4;
        }

        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) {
                --bg: #1a1a18;
                --bg2: #222220;
                --border: rgba(255,255,255,0.1);
                --border2: rgba(255,255,255,0.18);
                --text: #f0ede8;
                --text2: #a8a49e;
                --text3: #6a6760;
                --gray-100: #2a2a28;
            }
        }

        html[data-theme="dark"] {
            --bg: #1a1a18;
            --bg2: #222220;
            --border: rgba(255,255,255,0.1);
            --border2: rgba(255,255,255,0.18);
            --text: #f0ede8;
            --text2: #a8a49e;
            --text3: #6a6760;
            --gray-100: #2a2a28;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            min-height: 100vh; 
            transition: background 0.3s ease, color 0.3s ease; 
        }
        .container { max-width: 520px; margin: 0 auto; padding: 20px 16px 80px; }
        
        .header { margin-bottom: 24px; }
        h1 { 
            font-family: 'DM Serif Display', serif; 
            font-size: 28px; 
            color: var(--accent); 
            margin-bottom: 4px; 
            transition: color 0.5s ease; 
        }
        .subtitle { color: var(--text3); font-size: 13px; }

        .setup-section, .selector-section, .race-detail { 
            background: var(--bg); 
            padding: 0; 
            border-radius: 0; 
            margin-bottom: 24px; 
            box-shadow: none; 
        }

        .input-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: .08em; 
            color: var(--text3); 
        }
        input[type="text"], select { 
            width: 100%; 
            padding: 12px 14px; 
            background: var(--bg2);
            border: 1px solid var(--border2); 
            border-radius: var(--radius); 
            font-size: 15px; 
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.3s; 
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: var(--accent); }
        
        .btn { 
            background: var(--accent); 
            color: white; 
            border: 1px solid var(--accent); 
            padding: 10px 14px; 
            border-radius: var(--radius); 
            font-size: 13px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-family: 'DM Sans', sans-serif;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .selector-grid { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
        .selector-card { 
            background: var(--bg);
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative; 
        }
        .selector-card:hover { border-color: var(--accent); }
        .selector-card.has-picks { border-color: var(--accent); }

        .date-info { display: flex; align-items: center; gap: 12px; }
        .date-badge { font-size: 17px; font-weight: 500; color: var(--text); min-width: 60px; }
        .day-name { font-size: 12px; color: var(--text2); min-width: 40px; }
        
        .track-selector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 16px 0; }
        .track-card { 
            background: var(--bg);
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 16px; 
            cursor: pointer; 
            transition: all 0.2s; 
            text-align: center; 
            position: relative; 
        }
        .track-card:hover { border-color: var(--accent); }
        .track-card.has-picks { border-color: var(--accent); }
        .track-name { font-size: 15px; font-weight: 500; color: var(--accent); transition: color 0.5s ease; }
        .race-count { font-size: 11px; color: var(--text3); margin-top: 4px; }

        .color-picker-section { margin: 20px 0; padding: 18px; background: var(--bg2); border-radius: var(--radius-lg); border: 1px solid var(--border2); }
        .color-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .color-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--text); }

        .race-list { display: grid; gap: 15px; margin: 20px 0; }
        .race-card { 
            background: var(--bg);
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 18px; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .race-card:hover { border-color: var(--accent); }
        .race-card.has-picks { border-color: var(--accent); }

        .race-info { flex: 1; }
        .race-number { font-size: 22px; font-weight: 500; color: var(--accent); margin-right: 15px; transition: color 0.5s ease; }
        .race-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
        .race-details { font-size: 12px; color: var(--text3); }
        .grade-badge { display: inline-block; background: #ffd700; color: #1a1a18; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-left: 8px; }

        .horse-list { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .horse-card { 
            background: var(--bg2);
            border: 2px solid var(--border); 
            border-radius: var(--radius); 
            padding: 12px 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
            min-height: 60px;
            display: flex; 
            align-items: center; 
            gap: 12px; 
            position: relative; 
        }
        .horse-card.gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            padding: 2px;
            background: var(--gradient-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .horse-card:hover { border-color: var(--accent); }
        .horse-card.selected { border-color: var(--accent); background: var(--bg); }
        .horse-number { font-size: 17px; font-weight: 500; min-width: 32px; transition: color 0.5s ease; color: var(--text3); }
        .horse-name { font-size: 14px; flex: 1; color: var(--text); }
        .horse-card.selected .horse-name { font-weight: 500; color: var(--accent); }
        .horse-card.selected .horse-number { color: var(--accent); }
        .picker-badge { position: static; padding: 0; border-radius: 50%; font-size: 14px; font-weight: 600; color: white; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
        .action-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .back-btn { background: var(--bg2); color: var(--text2); border-color: var(--border2); }
        .back-btn:hover { background: var(--gray-100); }
        .hidden { display: none; }
        .info-box { background: var(--gray-100); border-left: 4px solid var(--text3); padding: 12px 16px; margin: 16px 0; border-radius: 4px; font-size: 13px; color: var(--text2); }

        /* Styling for SVG icons within buttons */
        .btn svg {
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: block;
        }
    </style>
</head>
<body>

                        <svg width="20" height="20" viewBox="0 0 32 32">
                            <path d="M25.7,10.9C23.9,7.4,20.2,5,16,5c-4.7,0-8.6,2.9-10.2,7"/>
                            <path d="M6.2,21c1.8,3.5,5.5,6,9.8,6c4.7,0,8.6-2.9,10.2-7"/>

                    <div class="color-option" style="background: #ffc107;" data-color="#ffc107" onclick="selectColor('#ffc107')"></div>

                    <div class="color-option" style="background: #9c27b0;" data-color="#9c27b0" onclick="selectColor('#9c27b0')"></div>

                    <svg width="20" height="20" viewBox="0 0 32 32">
                        <path d="M25.7,10.9C23.9,7.4,20.2,5,16,5c-4.7,0-8.6,2.9-10.2,7"/>
                        <path d="M6.2,21c1.8,3.5,5.5,6,9.8,6c4.7,0,8.6-2.9,10.2-7"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
let U='',S='',C='#f44336',D='',T='',R=null,P=new Set(),races=[],poll=null,allSessionPicks=[];const API='https://horsie.tytygoins.workers.dev',RACES='https://raw.githubusercontent.com/pokemonrocks9/HorsieClub/main/races.json';

function selectColor(c){
    C=c;
    document.querySelectorAll('.color-option').forEach(e=>{
        e.classList.remove('selected');
        e.dataset.color===c&&e.classList.add('selected')
    });
    localStorage.setItem('userColor',c);
    applyTheme(c);
}

function applyTheme(c){
    const darker = darkenColor(c, 0.2), lighter = lightenColor(c, 0.9);
    document.documentElement.style.setProperty('--accent', c);
    document.documentElement.style.setProperty('--accent-light', lighter);
    document.documentElement.style.setProperty('--accent-dark', darker);
    
    // Force UI color updates for dynamic elements
    document.querySelectorAll('h1, .track-name, .race-number, .horse-number').forEach(e => {
        e.style.color = 'var(--accent)';
    });
    
    document.querySelectorAll('.btn').forEach(e => {
        if (!e.classList.contains('back-btn')) {
            e.style.background = 'var(--accent)';
            e.style.borderColor = 'var(--accent)';
        }
    });
    
    localStorage.setItem('userColor', c);
}

function darkenColor(hex,amt){
    if(!hex.startsWith('#')) return hex;
    let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.max(0,Math.floor(r*(1-amt)));
    g=Math.max(0,Math.floor(g*(1-amt)));
    b=Math.max(0,Math.floor(b*(1-amt)));
    return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function lightenColor(hex,amt){
    if(!hex.startsWith('#')) return hex;
    let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,Math.floor(r+(255-r)*amt));
    g=Math.min(255,Math.floor(g+(255-g)*amt));
    b=Math.min(255,Math.floor(b+(255-b)*amt));
    return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

window.addEventListener('DOMContentLoaded',async()=>{
    const c=localStorage.getItem('userColor');
    c?(selectColor(c),applyTheme(c)):applyTheme('#f44336');
    
    // Restore session for deep-linking/refresh support
    U = localStorage.getItem('horsie_user') || '';
    S = localStorage.getItem('horsie_session') || '';

    await autoClean();
    refreshSessions();
    document.getElementById('sessionCode').addEventListener('input',updateBtn);
    renderViewFromUrl();
});

window.addEventListener('popstate', () => renderViewFromUrl());

async function autoClean(){
    try{
        await fetch(`${API}/picks/old`,{method:'DELETE'});
        console.log('✅ Cleaned');
    }catch(e){}
}

async function loadAllSessionPicks(){
    if(!S)return;
    try{
        const r=await fetch(`${API}/picks?session=${S}`);
        if(r.ok){
            const data=await r.json();
            allSessionPicks=data;
            console.log(`Loaded ${allSessionPicks.length} total picks for session`);
        }else{
            allSessionPicks=[];
        }
    }catch(e){
        allSessionPicks=[];
    }
}

function hasPicksForDate(date){
    return allSessionPicks.some(p=>races.find(r=>r.id===p.race_id&&r.date===date));
}

function hasPicksForTrack(track){
    return allSessionPicks.some(p=>races.find(r=>r.id===p.race_id&&r.track===track&&r.date===D));
}

function hasPicksForRace(raceId){
    return allSessionPicks.some(p=>p.race_id===raceId);
}

async function refreshSessions(){
    const e=document.getElementById('activeSessions');
    e.innerHTML='<p style="color:var(--text3);">Loading...</p>';
    try{
        const r=await fetch(`${API}/picks/sessions`);
        if(!r.ok){
            e.innerHTML='<p style="color:#666;">API unavailable</p>';
            return;
        }
        const d=await r.json(),s={};
        d.forEach(p=>{
            s[p.session_code]||(s[p.session_code]={users:new Set,lastActivity:p.created_at,count:0});
            s[p.session_code].users.add(p.user_name);
            s[p.session_code].count++;
        });
        if(Object.keys(s).length===0){
            e.innerHTML='<p style="color:var(--text3);">No active sessions</p>';
        }else{
            let h='<div style="display:flex;flex-direction:column;gap:10px;">';
            for(const[c,i]of Object.entries(s)){
                const u=Array.from(i.users).join(', '),t=getTimeAgo(new Date(i.lastActivity));
                h+=`<div style="padding:10px;border:1px solid var(--border);border-radius:5px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;" onmouseover="this.style.background='var(--gray-100)'" onmouseout="this.style.background='var(--bg)'"><div onclick="joinExistingSession('${c}')" style="flex:1;"><strong>${c}</strong><br><small style="color:var(--text3);">Users: ${u} • ${i.count} picks • ${t}</small></div><button onclick="event.stopPropagation();deleteSession('${c}')" style="background:#f44336;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px;">Delete</button></div>`;
            }
            h+='</div>';
            e.innerHTML=h;
        }
    }catch(err){
        e.innerHTML='<p style="color:var(--text3);">API unavailable</p>';
    }
}

function joinExistingSession(c){
    document.getElementById('sessionCode').value=c;
    updateBtn();
}

function updateBtn(){
    const c=document.getElementById('sessionCode').value.trim(),b=document.getElementById('sessionBtn'),a=document.querySelectorAll('#activeSessions strong');
    let e=false;
    a.forEach(el=>{
        el.textContent===c&&(e=true);
    });
    b.textContent=e?'Join Session':'Create Session';
}

function getTimeAgo(d){
    const s=Math.floor((new Date-d)/1000);
    if(s<60)return'just now';
    const m=Math.floor(s/60);
    if(m<60)return`${m}m ago`;
    const h=Math.floor(m/60);
    if(h<24)return`${h}h ago`;
    return`${Math.floor(h/24)}d ago`;
}

async function deleteSession(c){
    if(!confirm(`Delete "${c}"?`))return;
    try{
        if(!(await fetch(`${API}/picks/${c}`,{method:'DELETE'})).ok)return;
        alert(`✅ Deleted "${c}"!`);
        await new Promise(r=>setTimeout(r,1000));
        await refreshSessions();
    }catch(e){
        alert(`Error: ${e.message}`);
    }
}

async function clearAllSessions(){
    if(!confirm('⚠️ Delete ALL?'))return;
    if(!confirm('Really sure?'))return;
    try{
        if(!(await fetch(`${API}/picks/all`,{method:'DELETE'})).ok)return;
        localStorage.clear();
        alert('✅ ALL deleted!');
        await new Promise(r=>setTimeout(r,1000));
        await refreshSessions();
    }catch(e){
        alert(`Error: ${e.message}`);
    }
}

async function joinSession() {
    const u=document.getElementById('username').value.trim(),s=document.getElementById('sessionCode').value.trim();
    if(!u||!s){
        alert('Enter both!');
        return;
    }
    U=u;
    S=s;
    localStorage.setItem('horsie_user', u);
    localStorage.setItem('horsie_session', s);
    document.getElementById('homeSvgBtn').classList.remove('hidden');
    await loadRaces();
    await loadAllSessionPicks();
    // Use replace:true so back from dates exits rather than showing login form
    updateUrl('date', '', '', '', true);
}

async function loadRaces(){
    try{
        races=await(await fetch(RACES)).json();
    }catch(e){
        alert('Error loading races');
    }
}

async function refreshRaces(){
    await loadRaces();
    updateUrl('date'); // Re-render the date selector
    alert(`Loaded ${races.length} races`);
}

function showDateSelector(){
    document.getElementById('headerTitle').textContent='🏇 Select a Race Day';
    const byDate={};
    races.forEach(r=>{
        r.date&&(byDate[r.date]||(byDate[r.date]=[]),byDate[r.date].push(r));
    });
    const g=document.getElementById('dateGrid');
    g.innerHTML='';
    Object.keys(byDate).sort((a,b)=>new Date(a)-new Date(b)).forEach(d=>{
        const dt=new Date(d+'T00:00:00'),day=dt.toLocaleDateString('en-US',{weekday:'short'}),str=dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}),c=document.createElement('div');
        c.className='selector-card';
        if(hasPicksForDate(d))c.classList.add('has-picks');
        c.onclick=()=>selectDate(d);
        c.innerHTML=`<div class="date-info"><div class="date-badge">${str}</div><div class="day-name">${day}</div></div><div class="race-count">${byDate[d].length} races</div>`;
        g.appendChild(c);
    });
    document.getElementById('dateSelector').classList.remove('hidden');
}

function selectDate(d){
    D=d;
    updateUrl('track', d);
}

function showTrackSelector(){
    document.getElementById('headerTitle').textContent='🏇 Select a Track';
    const byTrack={};
    races.filter(r=>r.date===D).forEach(r=>{
        byTrack[r.track]||(byTrack[r.track]=[]);
        byTrack[r.track].push(r);
    });
    const [y,m,d]=D.split('-');
    const dateObj=new Date(y,m-1,d);
    document.getElementById('selectedDateTitle').textContent=dateObj.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const g=document.getElementById('trackGrid');
    g.innerHTML='';
    Object.keys(byTrack).sort().forEach(t=>{
        const c=document.createElement('div');
        c.className='track-card';
        if(hasPicksForTrack(t))c.classList.add('has-picks');
        c.onclick=()=>selectTrack(t);
        c.innerHTML=`<div class="track-name">${t}</div><div class="race-count">${byTrack[t].length} races</div>`;
        g.appendChild(c);
    });
    document.getElementById('trackSelector').classList.remove('hidden');
}

function selectTrack(t){
    T=t;
    updateUrl('race', D, t);
}

function showRaceSelector(){
    document.getElementById('headerTitle').textContent='🏇 Select a Race';
    const rs=races.filter(r=>r.date===D&&r.track===T);
    rs.sort((a,b)=>(a.raceNumber||a.id)-(b.raceNumber||b.id));
    document.getElementById('selectedTrackTitle').textContent=`${T} - ${new Date(D + 'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
    const l=document.getElementById('raceList');
    l.innerHTML='';
    rs.forEach(r=>{
        const c=document.createElement('div');
        c.className='race-card';
        if(hasPicksForRace(r.id))c.classList.add('has-picks');
        c.onclick=()=>selectRace(r);
        const g=r.grade?`<span class="grade-badge">${r.grade}</span>`:'',n=r.raceNumber||r.id;
        c.innerHTML=`<div class="race-number">R${n}</div><div class="race-info"><div class="race-title">${r.title} ${g}</div><div class="race-details">${r.distance} ${r.surface} - ${r.horses.length} horses</div></div>`;
        l.appendChild(c);
    });
    document.getElementById('raceSelector').classList.remove('hidden');
}

function selectRace(r){
    R = r;
    updateUrl('detail', D, T, r.id);
}

function renderRaceDetail(r) {
    document.getElementById('headerTitle').textContent='🏇 Pick Your Horses';
    R=r;
    P.clear();
    const g=r.grade?`<span class="grade-badge">${r.grade}</span>`:'';
    document.getElementById('selectedRaceTitle').innerHTML=`${r.title} ${g}`;
    document.getElementById('selectedRaceInfo').textContent=`${r.track} - ${r.distance} ${r.surface}`;
    loadHorses(r);
    document.getElementById('raceDetail').classList.remove('hidden');
    startPoll();
}

function startPoll(){
    stopPoll();
    poll=setInterval(()=>{
        R&&loadExistingPicks();
    },3000);
}

function stopPoll(){
    poll&&(clearInterval(poll),poll=null);
}

function loadHorses(r){
    const l=document.getElementById('horseList');
    l.innerHTML='';
    [...r.horses].sort((a,b)=>a.number-b.number).forEach(h=>{
        const c=document.createElement('div');
        c.className='horse-card';
        c.onclick=()=>togglePick(h.number,c);
        c.innerHTML=`<div class="horse-number">#${h.number}</div><div class="horse-name">${h.name}</div>`;
        c.dataset.horseNumber=h.number;
        l.appendChild(c);
    });
    loadExistingPicks();
}

function togglePick(n,c){
    if(P.has(n)){
        P.delete(n);
        c.classList.remove('selected');
        c.style.background='';
    }else{
        P.add(n);
        c.classList.add('selected');
        c.style.background=`${C}15`;
    }
    updateButtons();
}

function updateButtons(){
    document.getElementById('confirmPickBtn').disabled=P.size===0;
}

async function confirmPicks(){
    if(P.size===0)return;
    const data={user:U,raceId:R.id,horses:Array.from(P),color:C,timestamp:new Date().toISOString()};
    try{
        await fetch(`${API}/picks`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_code:S,race_id:R.id,user_name:U,horse_numbers:Array.from(P),user_color:C})});
    }catch(e){}
    localStorage.setItem(`${S}_${R.id}_${U}`,JSON.stringify(data));
    localStorage.setItem(`${S}_${R.id}_confirmed`,'true');
    const names=Array.from(P).map(n=>`#${n} ${R.horses.find(h=>h.number===n).name}`).join(', ');
    alert(`✅ Picks confirmed!\n\nYou chose: ${names}`);
    await loadAllSessionPicks();
    loadExistingPicks();
    updateButtons();
}

async function loadExistingPicks(){
    const picks={},colors={};
    try{
        const r=await fetch(`${API}/picks?session=${S}&race=${R.id}`);
        if(r.ok)(await r.json()).forEach(p=>{
            picks[p.user_name]=JSON.parse(p.horse_numbers);
            p.user_color&&(colors[p.user_name]=p.user_color);
        });
    }catch(e){}
    for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith(`${S}_${R.id}_`)&&!k.endsWith('_confirmed')){
            const u=k.split('_').pop();
            if(!picks[u]){
                const d=JSON.parse(localStorage.getItem(k));
                picks[u]=d.horses;
                d.color&&(colors[u]=d.color);
            }
        }
    }
    colors[U]=C;
    
    // Remove all badges first
    document.querySelectorAll('.picker-badge').forEach(b=>b.remove());
    document.querySelectorAll('.picked-by-user2').forEach(c=>c.classList.remove('picked-by-user2'));
    
    // Reset all backgrounds and borders
    document.querySelectorAll('.horse-card').forEach(c=>{
        c.style.background='';
        c.style.backgroundImage='';
        c.style.backgroundOrigin='';
        c.style.backgroundClip='';
        c.style.border='';
        if(!c.classList.contains('selected')){
            c.style.border='2px solid var(--border)';
        }
    });
    
    // Track horses picked by multiple users
    const horsePickCounts={};
    Object.entries(picks).forEach(([u,hs])=>{
        hs.forEach(n=>{
            if(!horsePickCounts[n])horsePickCounts[n]=[];
            horsePickCounts[n].push({user:u,color:colors[u]||(u===U?C:'#ff9800')});
        });
    });
    
    // Add badges for all picks
    Object.entries(picks).forEach(([u,hs])=>{
        const col=colors[u]||(u===U?C:'#ff9800'),init=u.charAt(0).toUpperCase();
        hs.forEach(n=>{
            const c=document.querySelector(`[data-horse-number="${n}"]`);
            if(c){
                const b=document.createElement('div');
                b.className='picker-badge';
                b.style.background=col;
                b.textContent=init;
                b.title=u;
                c.appendChild(b);
                u!==U&&c.classList.add('picked-by-user2');
            }
        });
    });
    
    // Apply gradients after all badges are added
    Object.keys(horsePickCounts).forEach(n=>{
        const c=document.querySelector(`[data-horse-number="${n}"]`);
        const pickerData=horsePickCounts[n];
        if(c&&pickerData.length>1){
            // Multiple pickers - create smooth gradient with blended colors (lighter)
            const bgGradientStops=pickerData.map((data,i)=>{
                const pct=(i/(pickerData.length-1))*100;
                return `${data.color}15 ${pct}%`;
            }).join(', ');
            
            const borderGradientStops=pickerData.map((data,i)=>{
                const pct=(i/(pickerData.length-1))*100;
                return `${data.color} ${pct}%`;
            }).join(', ');
            
            // Set light background gradient
            c.style.background=`linear-gradient(90deg, ${bgGradientStops})`;
            
            // Use pseudo-element trick for rounded gradient border
            c.style.position='relative';
            c.style.background=`linear-gradient(90deg, ${bgGradientStops})`;
            c.style.border='none';
            c.style.setProperty('--gradient-border', `linear-gradient(90deg, ${borderGradientStops})`);
            
            // Add class to trigger pseudo-element
            c.classList.add('gradient-border');
        } else if(c&&pickerData.length===1){
            // Single picker - show their color with light background and solid border
            c.classList.remove('gradient-border');
            const pickerColor=pickerData[0].color;
            if(!P.has(parseInt(n))){
                // Not selected by current user - show other person's pick
                c.style.background=`${pickerColor}15`;
                c.style.border=`2px solid ${pickerColor}`;
            } else {
                // Selected by current user
                c.style.background=`${C}15`;
            }
        }
    });
}

function confirmExitSession() {
    if (confirm('Are you sure you want to exit the session? Your picks will be saved, but you will need to re-enter your name and session code.')) {
        goToSetupAndClearHistory();
    }
}

function goToSetupAndClearHistory() {
    stopPoll();
    U = '';
    S = '';
    D = '';
    T = '';
    R = null;
    P.clear();
    races = [];
    localStorage.removeItem('horsie_user');
    localStorage.removeItem('horsie_session');

    document.getElementById('homeSvgBtn').classList.add('hidden');
    document.getElementById('setup').classList.remove('hidden');
    document.getElementById('dateSelector').classList.add('hidden');
    document.getElementById('trackSelector').classList.add('hidden');
    document.getElementById('raceSelector').classList.add('hidden');
    document.getElementById('raceDetail').classList.add('hidden');
    document.getElementById('homeSvgBtn').classList.add('hidden');
    document.getElementById('headerTitle').textContent = '🏇 Horsie Picker'; // Reset header title
    history.replaceState({ view: 'setup' }, '', window.location.pathname);
}

function backToHome(){
    history.back();
}

function backToDateSelector(){
    history.back();
}

function backToTrackSelector(){
    history.back();
}

function backToRaceSelector(){
    history.back();
}

function updateUrl(v, d = '', t = '', r = '', replace = false) {
    const u = new URL(window.location.origin + window.location.pathname);
    u.searchParams.set('view', v);
    if (d) u.searchParams.set('date', d);
    if (t) u.searchParams.set('track', t);
    if (r) u.searchParams.set('raceId', r);
    const state = { view: v, date: d, track: t, raceId: r };
    if (replace) {
        history.replaceState(state, '', u.toString());
    } else {
        history.pushState(state, '', u.toString());
    }
    renderViewFromUrl();
}

async function renderViewFromUrl() {
    stopPoll();
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('dateSelector').classList.add('hidden');
    document.getElementById('trackSelector').classList.add('hidden');
    document.getElementById('raceSelector').classList.add('hidden');
    document.getElementById('raceDetail').classList.add('hidden');
    document.getElementById('homeSvgBtn').classList.add('hidden');
    
    const p = new URLSearchParams(window.location.search);
    let uv = p.get('view');
    const ud = p.get('date');
    const ut = p.get('track');
    const ur = p.get('raceId');

    if (!U || !S) {
        document.getElementById('setup').classList.remove('hidden');
        document.getElementById('headerTitle').textContent = '🏇 Horsie Picker';
        if (uv || ud || ut || ur) {
            history.replaceState({ view: 'setup' }, '', window.location.pathname);
        }
        return;
    }

    if (uv === 'setup') {
        if (confirm('Are you sure you want to exit the session?')) {
            goToSetupAndClearHistory();
            return;
        } else {
            history.pushState({ view: 'date' }, '', window.location.pathname + '?view=date');
            uv = 'date';
        }
    }

    // Show navigation button immediately before awaiting data
    const homeBtn = document.getElementById('homeSvgBtn');
    homeBtn.classList.remove('hidden');

    // Set icon based on view
    if (uv === 'date' || !uv) {
        homeBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-x"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
        homeBtn.onclick = confirmExitSession;
    } else {
        homeBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-home"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>`;
        homeBtn.onclick = () => updateUrl('date');
    }

    // Now await the data required for rendering the specific views
    if (races.length === 0) await loadRaces();
    if (allSessionPicks.length === 0) await loadAllSessionPicks();

    if (uv === 'detail' && ur && ud && ut) {
        D = ud; T = ut;
        R = races.find(e => e.id == ur && e.date === D && e.track === T);
        if (R) renderRaceDetail(R); else updateUrl('race', D, T, '', true);
    } else if (uv === 'race' && ut && ud) {
        D = ud; T = ut; showRaceSelector();
    } else if (uv === 'track' && ud) {
        D = ud; showTrackSelector();
    } else {
        showDateSelector();
        if (!uv) history.replaceState({ view: 'date' }, '', window.location.pathname + '?view=date');
    }
}
    </script>
