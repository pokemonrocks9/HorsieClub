<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Horsie Picker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a18">
    <meta name="theme-color" id="pwa-theme-color" content="#1a1a18">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
    <script>
        const savedTheme = localStorage.getItem('horsie_theme') || 'system';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <style>
        :root {
            --accent: #f44336;
            --accent-light: #FCEBEB;
            --accent-dark: #A32D2D;
            --bg: #ffffff;
            --bg2: #F7F6F3;
            --border: rgba(0,0,0,0.1);
            --border2: rgba(0,0,0,0.18);
            --text: #1a1a18;
            --text2: #5a5a54;
            --text3: #9a9990;
            --radius: 10px;
            --radius-lg: 14px;
            --gray-100: #F5F5F4;
        }

        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) {
                --bg: #1a1a18;
                --bg2: #222220;
                --border: rgba(255,255,255,0.1);
                --border2: rgba(255,255,255,0.18);
                --text: #f0ede8;
                --text2: #a8a49e;
                --text3: #6a6760;
                --gray-100: #2a2a28;
            }
        }

        html[data-theme="dark"] {
            --bg: #1a1a18;
            --bg2: #222220;
            --border: rgba(255,255,255,0.1);
            --border2: rgba(255,255,255,0.18);
            --text: #f0ede8;
            --text2: #a8a49e;
            --text3: #6a6760;
            --gray-100: #2a2a28;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            min-height: 100vh; 
            transition: background 0.3s ease, color 0.3s ease; 
        }
        .container { max-width: 520px; margin: 0 auto; padding: 20px 16px 80px; }
        
        .header { margin-bottom: 24px; }
        h1 { 
            font-family: 'DM Serif Display', serif; 
            font-size: 28px; 
            color: var(--accent); 
            margin-bottom: 4px; 
            transition: color 0.5s ease; 
        }
        .subtitle { color: var(--text3); font-size: 13px; }

        .setup-section, .selector-section, .race-detail { 
            background: var(--bg); 
            padding: 0; 
            border-radius: 0; 
            margin-bottom: 24px; 
            box-shadow: none; 
        }

        .input-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: .08em; 
            color: var(--text3); 
        }
        input[type="text"], select { 
            width: 100%; 
            padding: 12px 14px; 
            background: var(--bg2);
            border: 1px solid var(--border2); 
            border-radius: var(--radius); 
            font-size: 15px; 
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.3s; 
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: var(--accent); }
        
        .btn { 
            background: var(--accent); 
            color: white; 
            border: 1px solid var(--accent); 
            padding: 10px 14px; 
            border-radius: var(--radius); 
            font-size: 13px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-family: 'DM Sans', sans-serif;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

        .selector-grid { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
        .selector-card { 
            background: var(--bg);
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: relative; 
        }
        .selector-card:hover { border-color: var(--accent); }
        .selector-card.has-picks { border-color: var(--accent); }

        .date-info { display: flex; align-items: center; gap: 12px; }
        .date-badge { font-size: 17px; font-weight: 500; color: var(--text); min-width: 60px; }
        .day-name { font-size: 12px; color: var(--text2); min-width: 40px; }
        
        .track-selector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 16px 0; }
        .track-card { 
            background: var(--bg);
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 16px; 
            cursor: pointer; 
            transition: all 0.2s; 
            text-align: center; 
            position: relative; 
        }
        .track-card:hover { border-color: var(--accent); }
        .track-card.has-picks { border-color: var(--accent); }
        .track-name { font-size: 15px; font-weight: 500; color: var(--accent); transition: color 0.5s ease; }
        .race-count { font-size: 11px; color: var(--text3); margin-top: 4px; }

        .color-picker-section { margin: 20px 0; padding: 18px; background: var(--bg2); border-radius: var(--radius-lg); border: 1px solid var(--border2); }
        .color-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .color-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--text); }

        .race-list { display: grid; gap: 15px; margin: 20px 0; }
        .race-card { 
            background: var(--bg);
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 18px; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .race-card:hover { border-color: var(--accent); }
        .race-card.has-picks { border-color: var(--accent); }

        .race-info { flex: 1; }
        .race-number { font-size: 22px; font-weight: 500; color: var(--accent); margin-right: 15px; transition: color 0.5s ease; }
        .race-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
        .race-details { font-size: 12px; color: var(--text3); }
        .grade-badge { display: inline-block; background: #ffd700; color: #1a1a18; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-left: 8px; }

        .horse-list { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .horse-card { 
            background: var(--bg2);
            border: 1px solid var(--border); 
            border-radius: var(--radius); 
            padding: 12px 14px; 
            cursor: pointer; 
            transition: all 0.2s; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            position: relative; 
        }
        .horse-card.gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            padding: 2px;
            background: var(--gradient-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .horse-card:hover { border-color: var(--accent); }
        .horse-card.selected { border-color: var(--accent); background: var(--bg); }
        .horse-number { font-size: 17px; font-weight: 500; min-width: 32px; transition: color 0.5s ease; color: var(--text3); }
        .horse-name { font-size: 14px; flex: 1; color: var(--text); }
        .horse-card.selected .horse-name { font-weight: 500; color: var(--accent); }
        .horse-card.selected .horse-number { color: var(--accent); }
        .picker-badge { position: static; padding: 0; border-radius: 50%; font-size: 14px; font-weight: 600; color: white; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
        .action-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .back-btn { background: var(--bg2); color: var(--text2); border-color: var(--border2); }
        .back-btn:hover { background: var(--gray-100); }
        .hidden { display: none; }
        .info-box { background: var(--gray-100); border-left: 4px solid var(--text3); padding: 12px 16px; margin: 16px 0; border-radius: 4px; font-size: 13px; color: var(--text2); }
    </style>
</head>
<body>
    <!-- ... (rest of your HTML body content) ... -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
